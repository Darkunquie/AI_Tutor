title = "Talkivo gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "jwt-secret"
description = "JWT signing secret"
regex = '''JWT_SECRET\s*=\s*["']?[A-Za-z0-9+/=_-]{20,}'''

[[rules]]
id = "groq-key"
description = "Groq API key"
regex = '''gsk_[A-Za-z0-9]{32,}'''

[allowlist]
paths = [
  '''node_modules/''',
  '''\.next/''',
  '''src/generated/''',
]
