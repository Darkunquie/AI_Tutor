version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
      dev-minor-patch:
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
